---
layout: default
---
{% for tag in site.tags %}
<article>
  <p>{{ tag[0] }}</p>
  <ul>
    {% for post in tag[1] %}
    <li><a href="{{ post.url }}">{{ post.title | upcase}}</a></li>
    {% endfor %}
  </ul>
</article>
{% endfor %}
