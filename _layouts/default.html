<!DOCTYPE html>
<html lang="zh-Hans">
{% include head.html %}

<body>
    {% include header.html %}
    <main>
        <ul>
            {% for post in paginator.posts %}
            <li>
                <a href="{{ post.url }}">{{ post.title | upcase}}</a>
            </li>
            {% endfor %}
        </ul>
        <nav>
            <ul>
                {% if paginator.previous_page != nil %}
                <li>
                    <button><a href="{{paginator.previous_page_path}}">前一页</a></button>
                </li>
                {% endif %}
                {% if paginator.next_page != nil %}
                <li>
                    <button><a href="{{paginator.next_page_path}}">后一页</a></button>
                </li>
                {% endif %}
            </ul>
        </nav>
    </main>
    {% include footer.html %}
    <script>
        document.getElementById('year').innerText = new Date().getFullYear()
    </script>
</body>

</html>
