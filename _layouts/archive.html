---
layout: default
---
{% for post in page.posts %}
<article>
    <header>
        <aside>
            <p>{{ post.categories | array_to_sentence_string }}</p>
            <p>{{ post.tags | array_to_sentence_string }}</p>
            <p>{{ post.date | date: "%Y年%m月%d日" }}</p>
        </aside>
        <h3>
            <a href="{{ post.url }}">{{ post.title | upcase }}</a>
        </h3>
    </header>
</article>
{% endfor %}
