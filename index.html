---
layout: default
---
{% for post in paginator.posts %}
<article>
    <header>
        <p>{{ post.date | date: "%Y年%m月%d日" }}</p>
        <h1>
            <a href="{{ post.url }}">{{ post.title | upcase}}</a>
        </h1>
    </header>
</article>
{% endfor %}
<p>
    {% if paginator.previous_page != nil %}
    <button>
        <a href="{{paginator.previous_page_path}}">前一页</a>
    </button>
    {% endif %}
    {% if paginator.next_page != nil %}
    <button>
        <a href="{{paginator.next_page_path}}">后一页</a>
    </button>
    {% endif %}
</p>
