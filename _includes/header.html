<header>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
  <nav>
    <ul>
      {% for item in site.data.navigation %}
      <li>
        <a href="{{ item.link }}">{{ item.name }}</a>
      </li>
      {% endfor %}
      <li>
        <form action="https://cse.google.com/cse?cx=004513966020022949442:zsgss2lhuso" method="get" id="search">
          <input type="text" name="q" placeholder="回车搜索" onkeypress="search(event)">
        </form>
      </li>
    </ul>
  </nav>
</header>
<script type="text/javascript">
  function search(event) {
    if (event.key == "Enter") {
      document.getElementById('search').submit()
    }
  }
</script>
