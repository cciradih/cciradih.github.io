<script type="text/javascript">
  const xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function () {
    if (xhr.readyState === XMLHttpRequest.DONE) {
      if (xhr.status === 200) {
        const meatMenuSet = JSON.parse(xhr.responseText).meatMenuSet;
        const soupMenuSet = JSON.parse(xhr.responseText).soupMenuSet;
        const vegetableMenuSet = JSON.parse(xhr.responseText).vegetableMenuSet;
        const day = new Date().getDay();
        document.getElementById("meat").innerText = meatMenuSet[day].name
        document.getElementById("vegetable").innerText = soupMenuSet[day].name
        document.getElementById("soup").innerText = vegetableMenuSet[day].name
      }
    }
  };
  xhr.open("GET", "https://limtooic.herokuapp.com/menu/weekly/latest/", true);
  xhr.send();
